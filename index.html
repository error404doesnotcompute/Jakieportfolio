<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Assets/favicon.png">
    <title>Jakie-Jae Woolley | IT Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Global Styles & Smooth Scrolling */
        html { scroll-behavior: smooth; }
        body { 
            background-color: #0f1523; /* Dark navy to seamlessly blend with your image */
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
            display: flex; 
        }
        
	/* ----------------------------------- */
        /* HAMBURGER ICON (MOBILE ONLY)        */
        /* ----------------------------------- */
        .hamburger {
            display: none;
            cursor: pointer;
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1001; /* Stays above the sidebar */
        }
        .bar {
            display: block;
            width: 30px;
            height: 4px;
            margin: 6px auto;
            background-color: #5de0e6;
            transition: all 0.3s ease-in-out;
            border-radius: 2px;
        }

        /* Hamburger to X Animation */
        .hamburger.active .bar:nth-child(2) { opacity: 0; }
        .hamburger.active .bar:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .hamburger.active .bar:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        /* ----------------------------------- */
        /* SIDEBAR NAVIGATION                  */
        /* ----------------------------------- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background-color: #0a192f; /* Solid Navy Blue */
            border-right: 2px solid transparent;
            border-image: #0a192f;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-brand {
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(93, 224, 230, 0.2);
            letter-spacing: 1px;
        }
        .sidebar-brand span { color: #5de0e6; }

        .sidebar a {
            color: #d0d0d0;
            text-decoration: none;
            padding: 15px 30px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: block;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            color: #5de0e6;
            background-color: rgba(93, 224, 230, 0.05);
            border-left: 4px solid #5de0e6;
            padding-left: 35px;
        }

        /* ----------------------------------- */
        /* MAIN CONTENT WRAPPER                */
        /* ----------------------------------- */
        .main-content {
            margin-left: 250px; 
            width: calc(100% - 250px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Landing Page Image Styles */
        .intro-image {
            max-width: 100%;
            height: auto;
            max-height: 70vh; /* Keeps it from getting too tall on large screens */
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Button Styles */
        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn { 
            display: inline-block; 
            background: linear-gradient(90deg, #004aad, #5de0e6); 
            color: #101728; 
            padding: 15px 35px; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 1.1rem; 
            text-decoration: none; 
            letter-spacing: 1px; 
            transition: all 0.3s ease; 
            border: none; 
            cursor: pointer; 
        }
        
        .btn:hover { 
            background: linear-gradient(90deg, #5de0e6, #004aad); 
            transform: translateY(-3px); 
            color: #ffffff; 
            box-shadow: 0 5px 15px rgba(93, 224, 230, 0.4);
        }

        /* Mobile Responsiveness */
        @media (max-width: 850px) {
            .hamburger { display: block; }
            .sidebar { transform: translateX(-100%); } /* Hides sidebar off-screen */
            .sidebar.active { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); } /* Slides it back in */
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Hamburger Icon -->
    <div class="hamburger" id="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <!-- Dashboard Sidebar -->
    <div class="sidebar">
        <!-- Logo Area -->
        <div class="sidebar-brand">Jakie<span>.</span></div>
        
        <!-- Navigation Links -->
        <a href="index.html">About</a>
        <a href="experience.html">Experience</a>
        <a href="tech-stack.html">Tech Stack</a>
        <a href="qualifications.html">Qualifications</a>
        <a href="appraisals.html">Appraisals</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Main Content Wrapper -->
    <div class="main-content">

        <!-- Intro Image -->
        <img src="Assets/home1.png" alt="Hello, I'm Jakie. Open to Work." class="intro-image">

        <!-- Action Buttons -->
        <div class="button-group">
	    <a href="experience.html" class="btn">Learn More</a>
            <a href="contact.html" class="btn">Get in Touch</a>
            <a href="http://www.linkedin.com/in/jakiewoolley" target="_blank" class="btn">LinkedIn</a>
	    <!-- Links to our new verification page instead of the direct PDF -->
            <a href="download-cv.html" class="btn">Download CV</a>
        </div>
    </div>
        </div>

    </div> <!-- End of Main Content -->

    <!-- JavaScript for Mobile Menu -->
    <script>
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            sidebar.classList.toggle('active');
        });
    </script>

</body>
</html>
