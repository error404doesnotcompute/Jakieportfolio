<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Assets/favicon.png">
    <title>Jakie-Jae Woolley | IT Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Global Styles & Smooth Scrolling */
        html { scroll-behavior: smooth; }
        body { 
            background-color: #0f1523; 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
            display: flex; 
            overflow-x: hidden;
        }

        /* ----------------------------------- */
        /* HAMBURGER ICON (BULLETPROOF)        */
        /* ----------------------------------- */
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 35px;
            height: 25px;
            cursor: pointer;
            position: fixed;
            top: 30px;
            right: 35px;
            z-index: 1002; /* Highest priority */
            background: none;
            border: none;
            padding: 0;
        }

        .hamburger .bar {
            width: 100%;
            height: 4px;
            background-color: #5de0e6;
            border-radius: 10px;
            transition: all 0.3s ease-in-out;
            transform-origin: left center;
        }

        /* Hamburger to X Animation */
        .hamburger.active .bar:nth-child(1) { transform: rotate(45deg); }
        .hamburger.active .bar:nth-child(2) { opacity: 0; width: 0; }
        .hamburger.active .bar:nth-child(3) { transform: rotate(-45deg); }

        /* ----------------------------------- */
        /* BACKGROUND OVERLAY                  */
        /* ----------------------------------- */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(3px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-in-out;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* ----------------------------------- */
        /* SIDEBAR NAVIGATION                  */
        /* ----------------------------------- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background-color: #0a192f; 
            border-right: 2px solid #5de0e6;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transform: translateX(-100%); 
            transition: transform 0.4s cubic-bezier(0.77,0.2,0.05,1.0);
        }

        .sidebar.active { 
            transform: translateX(0); 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8); 
        }

        .sidebar-brand { font-size: 2rem; font-weight: 900; color: #ffffff; text-align: center; padding: 40px 20px 20px; margin-bottom: 20px; border-bottom: 1px solid rgba(93, 224, 230, 0.2); letter-spacing: 1px; }
        .sidebar-brand span { color: #5de0e6; }
        .sidebar a { color: #d0d0d0; text-decoration: none; padding: 18px 40px; font-weight: 700; font-size: 1.15rem; transition: all 0.3s ease; display: block; border-left: 4px solid transparent; }
        .sidebar a:hover { color: #5de0e6; background-color: rgba(93, 224, 230, 0.05); border-left: 4px solid #5de0e6; padding-left: 45px; }

        /* ----------------------------------- */
        /* MAIN CONTENT WRAPPER                */
        /* ----------------------------------- */
        .main-content {
            margin-left: 0; 
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .center-wrapper {
            margin: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 900px;
        }

        .intro-image { max-width: 100%; height: auto; max-height: 70vh; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .button-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        .btn { display: inline-block; background: linear-gradient(90deg, #004aad, #5de0e6); color: #101728; padding: 15px 35px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; text-decoration: none; letter-spacing: 1px; transition: all 0.3s ease; border: none; cursor: pointer; text-align: center;}
        .btn:hover { background: linear-gradient(90deg, #5de0e6, #004aad); transform: translateY(-3px); color: #ffffff; box-shadow: 0 5px 15px rgba(93, 224, 230, 0.4); }

        /* ----------------------------------- */
        /* FOOTER STYLES                       */
        /* ----------------------------------- */
        .site-footer {
            text-align: center;
            padding: 25px 20px 20px;
            width: 100%;
            color: #888888;
            font-size: 0.9rem;
            border-top: 1px solid rgba(93, 224, 230, 0.1);
            box-sizing: border-box;
            margin-top: auto; 
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay"></div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">Jakie<span>.</span></div>
        <a href="index.html">About</a>
        <a href="experience.html">Experience</a>
        <a href="tech-stack.html">Tech Stack</a>
        <a href="qualifications.html">Qualifications</a>
        <a href="appraisals.html">Appraisals</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="main-content">

        <div class="center-wrapper">
            <img src="Assets/home1.png" alt="Hello, I'm Jakie. Open to Work." class="intro-image">

            <div class="button-group">
                <a href="experience.html" class="btn">Learn More</a>
                <a href="contact.html" class="btn">Get in Touch</a>
                <a href="http://www.linkedin.com/in/jakiewoolley" target="_blank" class="btn">LinkedIn</a>
                <a href="download-cv.html" class="btn">Download CV</a>
            </div>
        </div>

        <footer class="site-footer">
            <p>Built with <span style="color: #5de0e6; font-size: 1.1rem;">♥</span> by Jakie & Gemini</p>
        </footer>

    </div> <script>
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menuOverlay');

        // Function to toggle everything at once
        function toggleMenu() {
            hamburger.classList.toggle('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Open/Close when clicking the hamburger
        hamburger.addEventListener('click', toggleMenu);

        // Close when clicking the dark background overlay
        overlay.addEventListener('click', toggleMenu);
    </script>

</body>
</html>
